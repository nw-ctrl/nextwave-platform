name: Supabase Keepalive

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Ping Supabase targets
        env:
          SUPABASE_TARGETS_JSON: ${{ secrets.SUPABASE_TARGETS_JSON }}
        run: node scripts/supabase-keepalive.mjs